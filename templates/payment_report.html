<!DOCTYPE html>

<html>
<head>
    <title>Payment Report</title>

```
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
```

</head>

<body class="bg-gray-100">

<!-- Admin Navbar -->

<div class="bg-gray-900 text-white p-4">

```
<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

    <div class="flex flex-wrap gap-4 text-sm md:text-base">
        <a href="/dashboard">Dashboard</a>
        <a href="/students">Students</a>
        <a href="/verify-payments">Verify Payments</a>
        <a href="/payment-report">Payment Report</a>
    </div>

    <div>
        <a href="/logout"
           class="bg-red-600 px-4 py-2 rounded">
            Logout
        </a>
    </div>

</div>
```

</div>

<div class="p-4 md:p-10">

```
<h1 class="text-2xl md:text-3xl font-bold mb-6">
    Payment Report
</h1>

<div class="bg-white rounded shadow overflow-x-auto">

    <table class="w-full min-w-[700px]">

        <tr class="bg-green-600 text-white">
            <th class="p-4 text-left">Student</th>
            <th class="p-4 text-left">Amount</th>
            <th class="p-4 text-left">Month</th>
            <th class="p-4 text-left">Status</th>
        </tr>

        {% for payment in payments %}

        <tr class="border-b hover:bg-gray-100">

            <td class="p-4">
                {{ payment[1] }}
            </td>

            <td class="p-4">
                ₹ {{ payment[2] }}
            </td>

            <td class="p-4">
                {{ payment[3] }}
            </td>

            <td class="p-4">

                {% if payment[4] == "Verified" %}

                <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full">
                    Verified
                </span>

                {% else %}

                <span class="bg-red-100 text-red-700 px-3 py-1 rounded-full">
                    Pending
                </span>

                {% endif %}

            </td>

        </tr>

        {% endfor %}

    </table>

</div>
```

</div>

</body>
</html>
