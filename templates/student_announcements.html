<!DOCTYPE html>
<html>
<head>
    <title>Student Announcements</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="bg-blue-700 text-white p-4">

    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3">

        <h1 class="font-bold text-xl">
            Student Portal
        </h1>

        <div class="flex flex-wrap gap-3">

            <a href="/student-dashboard"
               class="bg-green-600 px-4 py-2 rounded">
                Dashboard
            </a>

            <a href="/my-payments"
               class="bg-purple-600 px-4 py-2 rounded">
                My Payments
            </a>

            <a href="/logout"
               class="bg-red-600 px-4 py-2 rounded">
                Logout
            </a>

        </div>

    </div>

</div>

<div class="max-w-5xl mx-auto p-4 md:p-8">

    <h1 class="text-3xl font-bold mb-6">
        📢 Announcements
    </h1>

    {% if announcements %}

        {% for a in announcements %}

        <div class="bg-white p-5 rounded-lg shadow mb-4">

            <div class="flex items-center gap-2 mb-2">

                <span class="text-2xl">
                    📢
                </span>

                <h2 class="text-xl font-bold text-blue-700">
                    {{ a[1] }}
                </h2>

            </div>

            <p class="text-gray-700 mt-2">
                {{ a[2] }}
            </p>

            <p class="text-sm text-gray-500 mt-4">
                Posted on: {{ a[3] }}
            </p>

        </div>

        {% endfor %}

    {% else %}

        <div class="bg-white p-6 rounded-lg shadow text-center">

            <h2 class="text-xl font-bold text-gray-600">
                No Announcements Yet
            </h2>

            <p class="text-gray-500 mt-2">
                Please check again later.
            </p>

        </div>

    {% endif %}

</div>

</body>
</html>
