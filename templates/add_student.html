<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-lg mx-auto mt-10 bg-white p-8 rounded shadow">

    <h1 class="text-3xl font-bold mb-6">
        Add Student
    </h1>

    <form method="POST" enctype="multipart/form-data">

        <input
            type="text"
            name="name"
            placeholder="Student Name"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <input
            type="text"
            name="class_name"
            placeholder="Class"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <input
            type="text"
            name="phone"
            placeholder="Phone"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <input
            type="text"
            name="username"
            placeholder="Username"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <!-- Profile Photo -->

        <h3 class="font-bold text-lg mb-2 mt-4">
            Student Profile Photo
        </h3>

        <input
            type="file"
            name="photo"
            accept="image/*"
            class="w-full border p-3 mb-4 rounded"
        >

        <!-- Attendance Days -->

        <h3 class="font-bold text-lg mb-2 mt-4">
            Attendance Days
        </h3>

        <div class="grid grid-cols-2 gap-3 mb-5">

            <label>
                <input type="checkbox" name="attendance_days" value="Mon">
                Monday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Tue">
                Tuesday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Wed">
                Wednesday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Thu">
                Thursday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Fri">
                Friday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Sat">
                Saturday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Sun">
                Sunday
            </label>

        </div>

        <button
            type="submit"
            class="bg-green-600 text-white p-3 rounded w-full hover:bg-green-700"
        >
            Add Student
        </button>

    </form>

</div>

</body>
</html>
