<!DOCTYPE html>
<html>
<head>
    <title>Attendance Management</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="bg-gray-900 text-white p-4">

    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

        <div class="flex flex-wrap gap-4">
            <a href="/dashboard">Dashboard</a>
            <a href="/students">Students</a>
            <a href="/attendance">Attendance</a>
            <a href="/payment-report">Payment Report</a>
        </div>

        <a href="/logout"
           class="bg-red-600 px-4 py-2 rounded">
            Logout
        </a>

    </div>

</div>

<div class="max-w-6xl mx-auto p-4 md:p-8">

    <h1 class="text-3xl font-bold mb-6">
        Attendance Management
    </h1>

    <div class="bg-white rounded-lg shadow overflow-hidden">

        <table class="w-full">

            <tr class="bg-blue-600 text-white">

                <th class="p-4 text-left">Student Name</th>
                <th class="p-4 text-left">Class</th>
                <th class="p-4 text-left">Attendance</th>
                <th class="p-4 text-left">Action</th>

            </tr>

            {% for student in students %}

            <tr class="border-b">

                <form method="POST" action="/mark-attendance">

                    <input
                        type="hidden"
                        name="student_id"
                        value="{{ student[0] }}"
                    >

                    <td class="p-4">
                        {{ student[1] }}
                    </td>

                    <td class="p-4">
                        {{ student[2] }}
                    </td>

                    <td class="p-4">

                        <select
                            name="status"
                            class="border p-2 rounded"
                        >
                            <option value="Present">
                                Present
                            </option>

                            <option value="Absent">
                                Absent
                            </option>

                            <option value="Late">
                                Late
                            </option>

                        </select>

                    </td>

                    <td class="p-4">

                        <button
                            class="bg-green-600 text-white px-4 py-2 rounded">
                            Save
                        </button>

                    </td>

                </form>

            </tr>

            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
