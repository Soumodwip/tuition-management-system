<!DOCTYPE html>
<html>
<head>
    <title>Verify Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<h1 class="text-3xl font-bold mb-6">
    Verify Payments
</h1>

<table class="w-full bg-white shadow">

<tr class="bg-red-600 text-white">
    <th class="p-3">Payment ID</th>
    <th class="p-3">Student ID</th>
    <th class="p-3">Amount</th>
    <th class="p-3">Month</th>
    <th class="p-3">Status</th>
    <th class="p-3">Action</th>
</tr>

{% for payment in payments %}
<tr class="border-b">

    <td class="p-3">{{ payment[0] }}</td>
    <td class="p-3">{{ payment[1] }}</td>
    <td class="p-3">{{ payment[2] }}</td>
    <td class="p-3">{{ payment[3] }}</td>
    <td class="p-3">{{ payment[4] }}</td>

    <td class="p-3">
        <a href="/verify/{{ payment[0] }}"
           class="bg-green-600 text-white px-4 py-2 rounded">
           Verify
        </a>
    </td>

</tr>
{% endfor %}

</table>

</body>
</html>
