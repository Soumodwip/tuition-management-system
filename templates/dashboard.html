<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navigation Bar -->
<div class="bg-gray-900 text-white p-4 flex justify-between items-center">

    <div class="flex gap-6">
        <a href="/dashboard">Dashboard</a>
        <a href="/students">Students</a>
        <a href="/add-student">Add Student</a>
        <a href="/verify-payments">Verify Payments</a>
        <a href="/payment-report">Payment Report</a>
    </div>

    <div class="flex gap-4 items-center">
        <span class="text-green-400 font-bold">
            Admin Panel
        </span>

        <a href="/logout"
           class="bg-red-600 px-4 py-2 rounded">
            Logout
        </a>
    </div>

</div>

<div class="p-10">

    <h1 class="text-4xl font-bold mb-8">
        Tuition Management Dashboard
    </h1>

    <!-- Statistics Cards -->
    <div class="grid grid-cols-3 gap-6 mb-10">

        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold">
                Total Students
            </h2>

            <p class="text-4xl mt-3 text-blue-600">
                {{ total_students }}
            </p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold">
                Total Payments
            </h2>

            <p class="text-4xl mt-3 text-green-600">
                {{ total_payments }}
            </p>
        </div>

        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-bold">
                Pending Payments
            </h2>

            <p class="text-4xl mt-3 text-red-600">
                {{ pending_payments }}
            </p>
        </div>

    </div>

    <!-- Action Buttons -->
    <div class="grid grid-cols-2 gap-6">

        <a href="/students"
           class="bg-blue-600 text-white p-6 rounded-lg text-center text-xl">
            View Students
        </a>

        <a href="/add-student"
           class="bg-green-600 text-white p-6 rounded-lg text-center text-xl">
            Add Student
        </a>

        <a href="/verify-payments"
           class="bg-red-600 text-white p-6 rounded-lg text-center text-xl">
            Verify Payments
        </a>

        <a href="/payment-report"
           class="bg-purple-600 text-white p-6 rounded-lg text-center text-xl">
            Payment Report
        </a>

    </div>

</div>

</body>
</html>
