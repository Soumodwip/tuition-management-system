<!doctype html>
<html>
  <head>
    <title>Edit Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <div class="max-w-lg mx-auto mt-10 bg-white p-8 rounded shadow">
      <h1 class="text-3xl font-bold mb-6">Edit Student</h1>

      <form method="POST">
        <input
          type="text"
          name="name"
          value="{{ student[1] }}"
          class="w-full border p-3 mb-3 rounded"
        />

        <input
          type="text"
          name="class_name"
          value="{{ student[2] }}"
          class="w-full border p-3 mb-3 rounded"
        />

        <input
          type="text"
          name="phone"
          value="{{ student[3] }}"
          class="w-full border p-3 mb-3 rounded"
        />

        <input
          type="email"
          name="email"
          value="{{ student[4] }}"
          class="w-full border p-3 mb-3 rounded"
        />

        <button class="bg-green-600 text-white p-3 rounded w-full">
          Update Student
        </button>
      </form>
    </div>
  </body>
</html>
