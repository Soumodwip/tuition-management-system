<!doctype html>
<html>
<head>
    <title>Edit Student</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-lg mx-auto mt-10 bg-white p-8 rounded shadow">

    <h1 class="text-3xl font-bold mb-6">
        Edit Student
    </h1>

    <form method="POST">

        <input
            type="text"
            name="name"
            value="{{ student[1] }}"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <input
            type="text"
            name="class_name"
            value="{{ student[2] }}"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <input
            type="text"
            name="phone"
            value="{{ student[3] }}"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <input
            type="email"
            name="email"
            value="{{ student[4] }}"
            class="w-full border p-3 mb-3 rounded"
            required
        >

        <h3 class="font-bold text-lg mb-2 mt-4">
            Attendance Days
        </h3>

        <div class="grid grid-cols-2 gap-3 mb-5">

            <label>
                <input type="checkbox" name="attendance_days" value="Mon">
                Monday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Tue">
                Tuesday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Wed">
                Wednesday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Thu">
                Thursday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Fri">
                Friday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Sat">
                Saturday
            </label>

            <label>
                <input type="checkbox" name="attendance_days" value="Sun">
                Sunday
            </label>

        </div>

        <button
            class="bg-green-600 text-white p-3 rounded w-full">
            Update Student
        </button>

    </form>

</div>

</body>
</html>
