<!DOCTYPE html>

<html>
<head>
    <title>Pay Fee</title>


<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>


</head>

<body class="bg-gray-100">

<!-- Navbar -->

<div class="bg-blue-700 text-white p-4">


<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-3">

    <h1 class="font-bold text-xl">
        Student Portal
    </h1>

    <div class="flex flex-wrap gap-3">

        <a href="/student-dashboard"
           class="bg-green-600 px-4 py-2 rounded">
            Dashboard
        </a>

        <a href="/my-payments"
           class="bg-purple-600 px-4 py-2 rounded">
            My Payments
        </a>

        <a href="/logout"
           class="bg-red-600 px-4 py-2 rounded">
            Logout
        </a>

    </div>

</div>


</div>

<div class="max-w-lg mx-auto mt-6 md:mt-10 px-4">


<div class="bg-white p-6 md:p-8 rounded shadow">

    <h1 class="text-2xl md:text-3xl font-bold mb-2">
        Submit Fee Payment
    </h1>

    <p class="text-gray-600 mb-6">
        Fill the details below and submit your payment request.
    </p>

    <form method="POST">

        <label class="font-semibold block mb-2">
            Amount
        </label>

        <input
            type="number"
            name="amount"
            placeholder="Enter Amount"
            class="w-full border p-3 mb-4 rounded"
            required
        >

        <label class="font-semibold block mb-2">
            Payment Month
        </label>

        <input
            type="text"
            name="payment_month"
            placeholder="Example: June 2026"
            class="w-full border p-3 mb-6 rounded"
            required
        >

        <button
            type="submit"
            class="w-full bg-green-600 text-white p-3 rounded text-lg">
            Mark as Paid
        </button>

    </form>

</div>


</div>

</body>
</html>
